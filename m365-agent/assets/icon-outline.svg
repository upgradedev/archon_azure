<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" width="32" height="32">
  <!-- Outline version: white on transparent, 32x32 for Teams tab icons -->
  <!-- Greek column outline -->
  <rect x="14" y="6" width="4" height="13" fill="none" stroke="white" stroke-width="1.5"/>
  <!-- Capital -->
  <rect x="9" y="4" width="14" height="3" rx="0.5" fill="none" stroke="white" stroke-width="1.5"/>
  <!-- Base -->
  <rect x="8.5" y="19" width="15" height="2" rx="0.5" stroke="white" stroke-width="1.5" fill="none"/>
  <rect x="7" y="21" width="18" height="1.5" rx="0.5" stroke="white" stroke-width="1.5" fill="none"/>
  <!-- Chart line -->
  <polyline points="7,28 12,25 18,22.5 25,19" stroke="white" stroke-width="1.5" fill="none" stroke-linecap="round"/>
  <circle cx="25" cy="19" r="1.2" fill="white"/>
</svg>
